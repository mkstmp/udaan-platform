<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Udaan — Academic Excellence Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --indigo:#1A2E5C;--indigo-2:#24407e;--marigold:#F4A300;--marigold-deep:#d98b00;
    --cream:#FBF7EF;--paper:#ffffff;--ink:#20242E;--muted:#6b7180;--line:#e9e2d4;
    --sprout:#2E7D5B;--sprout-soft:#e7f2ec;--danger:#b5442e;
    --shadow:0 1px 2px rgba(26,46,92,.06),0 8px 24px rgba(26,46,92,.08);--radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  h1,h2,h3,h4{font-family:Fraunces,Georgia,serif;font-weight:600;line-height:1.1;margin:0}
  a{color:inherit}
  button{font-family:inherit}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}
  .app{min-height:100vh;display:flex;flex-direction:column}
  header.top{position:sticky;top:0;z-index:40;background:rgba(251,247,239,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top .wrap{display:flex;align-items:center;gap:16px;height:64px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
  .kite{width:30px;height:30px;flex:0 0 auto}
  .brand .name{font-family:Fraunces;font-weight:600;font-size:21px;letter-spacing:-.01em}
  .brand .name b{color:var(--indigo)}
  .brand .name span{color:var(--marigold-deep)}
  nav.main{margin-left:auto;display:flex;gap:4px;align-items:center}
  nav.main a{font-size:14px;font-weight:500;color:var(--muted);padding:8px 12px;border-radius:9px;cursor:pointer;text-decoration:none;transition:.15s}
  nav.main a:hover{color:var(--ink);background:rgba(26,46,92,.05)}
  nav.main a.active{color:var(--indigo);background:rgba(244,163,0,.14)}
  .nav-cta{background:var(--indigo);color:#fff !important;padding:9px 16px !important;border-radius:10px;font-weight:600 !important}
  .nav-cta:hover{background:var(--indigo-2) !important}
  .admin-link{color:#9aa0ad !important;font-size:13px !important}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-weight:600;font-size:15px;padding:13px 22px;border-radius:12px;transition:.15s;text-decoration:none}
  .btn.lg{padding:15px 26px;font-size:16px}
  .btn.primary{background:var(--marigold);color:#3a2a00;box-shadow:0 6px 16px rgba(244,163,0,.28)}
  .btn.primary:hover{background:var(--marigold-deep);transform:translateY(-1px)}
  .btn.indigo{background:var(--indigo);color:#fff}
  .btn.indigo:hover{background:var(--indigo-2)}
  .btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--indigo);color:var(--indigo)}
  .btn.block{width:100%}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:26px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--marigold-deep)}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .hero{position:relative;overflow:hidden;padding:64px 0 48px}
  .hero .wrap{position:relative;z-index:2}
  .sky{position:absolute;inset:0;z-index:1;pointer-events:none}
  .hero h1{font-size:clamp(38px,6vw,62px);letter-spacing:-.02em;color:var(--indigo)}
  .hero h1 em{font-style:normal;color:var(--marigold-deep)}
  .hero .lede{font-size:19px;color:#4a5164;max-width:560px;margin:18px 0 8px}
  .motto{font-family:Fraunces;font-style:italic;font-size:18px;color:var(--indigo);opacity:.85;margin:6px 0 26px}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
  .hero-meta{display:flex;gap:28px;margin-top:34px;flex-wrap:wrap}
  .hero-meta .m .k{font-family:Fraunces;font-size:26px;color:var(--indigo);font-weight:600}
  .hero-meta .m .l{font-size:13px;color:var(--muted);margin-top:2px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--sprout-soft);color:var(--sprout);font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:20px}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--sprout);box-shadow:0 0 0 4px rgba(46,125,91,.18)}
  .levels{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:52px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper)}
  .levels .lv{padding:20px 18px;border-right:1px solid var(--line);position:relative}
  .levels .lv:last-child{border-right:0}
  .levels .lv .n{font-size:12px;font-weight:700;color:var(--marigold-deep);letter-spacing:.1em}
  .levels .lv h4{font-size:18px;margin:8px 0 4px;color:var(--indigo)}
  .levels .lv p{font-size:13px;color:var(--muted);margin:0}
  .levels .lv .arrow{position:absolute;right:-9px;top:50%;transform:translateY(-50%);z-index:3;width:18px;height:18px;background:var(--marigold);border-radius:50%;display:grid;place-items:center;color:#3a2a00;font-size:11px}
  .levels .lv:last-child .arrow{display:none}
  section.band{padding:56px 0}
  .band.tint{background:linear-gradient(180deg,transparent,rgba(244,163,0,.05))}
  .sec-head{max-width:620px;margin-bottom:30px}
  .sec-head h2{font-size:32px;color:var(--indigo);letter-spacing:-.01em}
  .sec-head p{color:var(--muted);font-size:16px;margin-top:10px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .feature{padding:22px}
  .feature .ic{width:42px;height:42px;border-radius:11px;background:rgba(26,46,92,.07);display:grid;place-items:center;margin-bottom:14px;color:var(--indigo)}
  .feature h4{font-size:17px;margin-bottom:6px}
  .feature p{font-size:14px;color:var(--muted);margin:0}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#3a4152}
  .field .req{color:var(--danger)}
  .input,select.input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);transition:.15s}
  .input:focus,select.input:focus{outline:0;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(26,46,92,.1)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg .opt{border:1.5px solid var(--line);border-radius:10px;padding:9px 15px;font-size:14px;font-weight:500;cursor:pointer;background:#fff;transition:.15s}
  .seg .opt:hover{border-color:var(--indigo)}
  .seg .opt.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
  .steps{display:flex;align-items:center;gap:0;margin-bottom:26px;flex-wrap:wrap}
  .steps .s{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);font-weight:500}
  .steps .s .num{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:700;background:#fff}
  .steps .s.on{color:var(--indigo)}
  .steps .s.on .num{background:var(--indigo);color:#fff;border-color:var(--indigo)}
  .steps .s.done .num{background:var(--sprout);color:#fff;border-color:var(--sprout)}
  .steps .bar{flex:1;height:1.5px;background:var(--line);margin:0 10px;min-width:16px}
  .admit{border:1px solid var(--indigo);border-radius:18px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
  .admit .a-top{background:var(--indigo);color:#fff;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .admit .a-top h3{font-size:20px}
  .admit .a-body{padding:24px;display:grid;grid-template-columns:1fr 120px;gap:20px}
  .admit .kv{display:grid;grid-template-columns:130px 1fr;gap:8px 14px;font-size:14px}
  .admit .kv .k{color:var(--muted);font-weight:500}
  .admit .kv .v{font-weight:600}
  .qr{width:120px;height:120px;border-radius:12px;border:1px solid var(--line);display:grid;place-items:center;background:repeating-conic-gradient(#20242E 0 25%, #fff 0 50%) 50%/12px 12px}
  .a-note{border-top:1px dashed var(--line);padding:16px 24px;font-size:13px;color:var(--muted)}
  .score-wrap{display:grid;grid-template-columns:220px 1fr;gap:26px;align-items:center}
  .altitude{position:relative;height:200px;border-radius:14px;background:linear-gradient(180deg,#eaf1ff,#fbf7ef);border:1px solid var(--line);overflow:hidden}
  .altitude .fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--marigold),var(--marigold-deep));transition:height 1.2s cubic-bezier(.2,.8,.2,1)}
  .altitude .lbl{position:absolute;left:12px;top:12px;font-family:Fraunces;font-size:15px;color:var(--indigo);z-index:2}
  .bignum{font-family:Fraunces;font-size:56px;color:var(--indigo);font-weight:600;line-height:1}
  .bignum small{font-size:22px;color:var(--muted)}
  .slices{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
  .slice{border:1px solid var(--line);border-radius:13px;padding:14px 16px;background:#fff}
  .slice .lv{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .slice .rank{font-family:Fraunces;font-size:24px;color:var(--indigo);font-weight:600;margin-top:3px}
  .slice .rank small{font-size:14px;color:var(--muted);font-weight:400}
  .slice .of{font-size:12px;color:var(--muted)}
  .slice.gold{background:linear-gradient(180deg,#fff8e9,#fff);border-color:#f3d488}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line)}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;background:#faf7f0}
  tbody tr:hover{background:#faf8f2}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .rankbadge{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:13px;background:rgba(26,46,92,.08);color:var(--indigo)}
  .rankbadge.g1{background:#f6d879;color:#5a4400}
  .rankbadge.g2{background:#dfe3ea;color:#3a4152}
  .rankbadge.g3{background:#f0c9a3;color:#6a3a12}
  .admin-shell{display:grid;grid-template-columns:210px 1fr;gap:0;min-height:calc(100vh - 64px)}
  .side{background:var(--indigo);color:#cdd6ea;padding:22px 14px}
  .side .brand2{color:#fff;font-family:Fraunces;font-size:18px;padding:0 10px 18px;display:flex;gap:8px;align-items:center}
  .side a{display:flex;gap:10px;align-items:center;padding:11px 12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:2px;color:#cdd6ea;text-decoration:none}
  .side a:hover{background:rgba(255,255,255,.08);color:#fff}
  .side a.active{background:var(--marigold);color:#3a2a00}
  .admin-main{padding:30px 34px;background:var(--cream);overflow:auto}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .l{font-size:13px;color:var(--muted);font-weight:500}
  .stat .v{font-family:Fraunces;font-size:30px;color:var(--indigo);font-weight:600;margin-top:4px}
  .stat .d{font-size:12px;color:var(--sprout);font-weight:600;margin-top:2px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar select,.toolbar input{padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
  textarea.input{width:100%;min-height:150px;font-family:ui-monospace,Menlo,monospace;font-size:13px;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;resize:vertical}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .tag.open{background:var(--sprout-soft);color:var(--sprout)}
  .tag.draft{background:#f1eadd;color:#8a6d1f}
  .tag.closed{background:#f4e2dd;color:var(--danger)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--indigo);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 12px 30px rgba(26,46,92,.3);opacity:0;transition:.25s;z-index:100;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--danger)}
  footer{border-top:1px solid var(--line);padding:30px 0;margin-top:auto;background:#fff}
  footer .wrap{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--muted)}
  .banner{background:var(--indigo);color:#eaf0ff;font-size:13px;text-align:center;padding:8px 16px}
  .banner b{color:var(--marigold)}
  .kbd{font-family:ui-monospace,monospace;background:#f1eadd;padding:1px 6px;border-radius:5px;font-size:12px;color:#6a5a2f}
  .divider{height:1px;background:var(--line);margin:22px 0}
  .backlink{display:inline-flex;gap:6px;align-items:center;font-size:14px;color:var(--muted);cursor:pointer;font-weight:500;margin-bottom:18px}
  .backlink:hover{color:var(--indigo)}
  .gslot{display:flex;justify-content:center;min-height:44px;margin:6px 0}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(26,46,92,.2);border-top-color:var(--indigo);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:820px){
    nav.main a:not(.nav-cta):not(.admin-link){display:none}
    .levels{grid-template-columns:1fr 1fr}.levels .lv:nth-child(2) .arrow{display:none}
    .grid3,.grid2{grid-template-columns:1fr}
    .score-wrap{grid-template-columns:1fr}.slices{grid-template-columns:1fr 1fr}
    .admin-shell{grid-template-columns:1fr}
    .side{display:flex;gap:6px;overflow:auto;padding:10px}.side .brand2{display:none}
    .stat-grid{grid-template-columns:1fr 1fr}.admit .a-body{grid-template-columns:1fr}
    .row2{grid-template-columns:1fr}.hero-meta{gap:18px}
  }
</style>
</head>
<body>
<div class="banner" id="banner">Loading Udaan…</div>
<div id="root" class="app"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   UDAAN — production SPA, wired to the FastAPI backend (same origin).
   Adults: real Google sign-in. Students: username-only (PII-free).
   ============================================================ */
const API = ""; // same origin (served by FastAPI)

const KITE=(c1='#F4A300',c2='#1A2E5C')=>`
<svg class="kite" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M24 3 L41 20 L24 45 L7 20 Z" fill="${c1}"/>
  <path d="M24 3 L24 45 M7 20 L41 20" stroke="${c2}" stroke-width="2" opacity=".55"/>
  <path d="M24 45 q4 5 -2 8 q6 1 4 -5" stroke="${c2}" stroke-width="1.6" fill="none" opacity=".7"/>
</svg>`;

/* ---------- global state ---------- */
const state={
  route:"home", ready:false,
  clientId:"", exams:[], exam:null,        // current exam
  idToken:null, identity:null, role:"Parent",
  centers:null, geo:null, panchayats:{},
  reg:{step:0, data:{}, result:null},
  lookup:{result:null, error:null},
  student:{data:null, admit:null, error:null},
  admit:{data:null},
  leaderboard:{cls:9, scope:"district", value:null, rows:null},
  admin:{page:"overview", regs:null, results:null, marksOut:null, centers:null, centerForm:{}, filters:{cls:"all",district:"all"}},
};

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function go(route){state.route=route;window.scrollTo(0,0);render();}
function fmtDate(d){if(!d)return'';try{const x=new Date(d);if(!isNaN(x))return x.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});}catch(e){}return d;}

/* ---------- API helper ---------- */
async function api(path,{method='GET',body=null,auth=false}={}){
  const headers={};
  if(body)headers['Content-Type']='application/json';
  if(auth){if(!state.idToken){throw new Error('Please sign in with Google first.');}headers['Authorization']='Bearer '+state.idToken;}
  const res=await fetch(API+path,{method,headers,body:body?JSON.stringify(body):null});
  let data=null;const txt=await res.text();
  try{data=txt?JSON.parse(txt):null;}catch(e){data=txt;}
  if(!res.ok){const msg=(data&&data.detail)?data.detail:('Request failed ('+res.status+')');throw new Error(msg);}
  return data;
}

/* ---------- Google Identity Services ---------- */
function jwtPayload(t){try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return{};}}
let _gsiReady=false;
function initGsi(){
  if(_gsiReady||!state.clientId||!(window.google&&google.accounts&&google.accounts.id))return;
  google.accounts.id.initialize({client_id:state.clientId,callback:onGoogleCredential,auto_select:false});
  _gsiReady=true;
}
function onGoogleCredential(resp){
  state.idToken=resp.credential;
  const p=jwtPayload(resp.credential);
  state.identity={name:p.name||p.email,email:(p.email||'').toLowerCase(),picture:p.picture};
  toast('Signed in as '+state.identity.name+' ✓');
  render();
}
function renderGoogleButtons(){
  if(!state.clientId){document.querySelectorAll('.gslot').forEach(s=>{s.innerHTML='<span class="hint">Google sign-in not configured yet.</span>';});return;}
  initGsi();
  if(!_gsiReady)return;
  document.querySelectorAll('.gslot').forEach(slot=>{slot.innerHTML='';google.accounts.id.renderButton(slot,{theme:'outline',size:'large',shape:'pill',text:'signin_with',width:280});});
}
function signOut(){state.idToken=null;state.identity=null;state.admin.regs=null;state.admin.results=null;if(window.google&&google.accounts)google.accounts.id.disableAutoSelect();render();}

/* ---------- boot ---------- */
async function boot(){
  try{
    const [cfg,exams]=await Promise.all([api('/api/config'),api('/api/exams')]);
    state.clientId=cfg.google_client_id||'';
    state.exams=exams||[];
    state.exam=state.exams.find(e=>e.status==='open')||state.exams.find(e=>e.status==='completed')||state.exams[0]||null;
  }catch(e){toast('Could not load exam data: '+e.message,true);}
  state.ready=true;render();
}

/* ---------- layout ---------- */
function banner(){
  const b=document.getElementById('banner');
  if(state.exam){const s=state.exam.status;b.innerHTML=`Current exam: <b>${esc(state.exam.name)} · ${esc((state.exam.eligible_classes||[]).join(', ')?'Class '+(state.exam.eligible_classes||[]).join('–'):'')} · ${esc(fmtDate(state.exam.exam_date))}</b> — ${s==='open'?'registration open.':s==='completed'?'results out.':'registration closed.'}`;}
  else b.innerHTML='Udaan Academic Excellence Program';
}
function topbar(){
  const links=[["home","Home"],["papers","Sample Papers"],["result","Results"],["leaderboard","Leaderboard"],["studentLogin","Student login"]];
  return `<header class="top"><div class="wrap">
    <div class="brand" onclick="go('home')">${KITE()}<span class="name"><b>Ud</b><span>aan</span></span></div>
    <nav class="main">
      ${links.map(([r,l])=>`<a class="${state.route===r?'active':''}" onclick="go('${r}')">${l}</a>`).join('')}
      <a class="nav-cta" onclick="go('register')">Register</a>
      <a class="admin-link" onclick="go('admin')">Admin</a>
    </nav>
  </div></header>`;
}
function footer(){
  return `<footer><div class="wrap">
    <div style="display:flex;gap:9px;align-items:center">${KITE()}<span>Udaan Academic Excellence Program</span></div>
    <div>पढ़ाई की क्रांति · Leap · Lead · Gyaan</div>
    <div>Offline exam · online everything-else</div>
  </div></footer>`;
}
function shell(inner){return topbar()+inner+footer();}

function stepper(){const labels=["Sign in","Student","Location","Done"];const cur=state.reg.step;
  return `<div class="steps">${labels.map((l,i)=>`${i>0?'<div class="bar"></div>':''}<div class="s ${i===cur?'on':''} ${i<cur?'done':''}"><span class="num">${i<cur?'✓':i+1}</span>${l}</div>`).join('')}</div>`;}
function register(){
  if(state.reg.step===3)return confirmation();
  const s=state.reg.step;let body='';
  if(s===0)body=regSignin();else if(s===1)body=regStudent();else if(s===2)body=regLocation();
  return shell(`
  <section class="band"><div class="wrap" style="max-width:620px">
    <div class="backlink" onclick="go('home')">← Home</div>
    <div class="sec-head" style="margin-bottom:18px"><span class="eyebrow">${esc(state.exam?state.exam.name:'Register')} · ${esc(state.exam?fmtDate(state.exam.exam_date):'')}</span>
      <h2 style="font-size:28px">Register a student</h2></div>
    ${stepper()}
    <div class="card pad">${body}</div>
  </div></section>`);
}

  }

  <p class="muted" style="font-size:14px;margin:0 0 18px">A parent or teacher signs in once with Google. This is the real-identity check — no OTP, no SMS. Students don't need their own email.</p>
  <div class="gslot"></div>
  <div class="hint center" style="margin-top:12px">Teachers can enroll a whole batch under one login.</div>`;
}
function regStudent(){
  const d=state.reg.data;
  const clsList=(state.exam&&state.exam.eligible_classes&&state.exam.eligible_classes.length)?state.exam.eligible_classes:[7,8,9,10];
  const clsOpts=clsList.map(c=>`<div class="opt ${d.cls==c?'on':''}" onclick="setReg('cls',${c})">Class ${c}</div>`).join('');
  const genOpts=["Girl","Boy","Other"].map(g=>`<div class="opt ${d.gender==g?'on':''}" onclick="setReg('gender','${g}')">${g}</div>`).join('');
  const medOpts=["Hindi","English"].map(m=>`<div class="opt ${d.medium==m?'on':''}" onclick="setReg('medium','${m}')">${m}</div>`).join('');
  return `<h3 style="font-size:20px;color:var(--indigo);margin-bottom:16px">Student details</h3>
  <div class="field"><label>Student's full name <span class="req">*</span></label><input class="input" id="sname" value="${esc(d.name||'')}"><div class="hint">Their login username is created from this name.</div></div>
  <div class="field"><label>Father / guardian name <span class="req">*</span></label><input class="input" id="fname" value="${esc(d.guardian||'')}"></div>
  <div class="field"><label>Class <span class="req">*</span></label><div class="seg">${clsOpts}</div></div>
  <div class="field"><label>School name <span class="req">*</span></label><input class="input" id="school" value="${esc(d.school||'')}" placeholder="e.g. Govt. High School, Benipur"><div class="hint">Stored for records — never printed on the admit card.</div></div>
  <div class="row2">
    <div class="field"><label>Date of birth</label><input class="input" id="dob" type="date" value="${esc(d.dob||'')}"><div class="hint">Private — never on admit card or results.</div></div>
    <div class="field"><label>Preferred medium</label><div class="seg">${medOpts}</div></div>
  </div>
  <div class="field"><label>Gender</label><div class="seg">${genOpts}</div></div>
  <button class="btn primary block lg" onclick="saveStudent()">Continue →</button>`;
}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
// Preserve typed text before a seg-button click re-renders the student step.
function snapStudentInputs(){const d=state.reg.data;
  [['sname','name'],['fname','guardian'],['school','school'],['dob','dob']].forEach(([id,k])=>{
    const el=document.getElementById(id);if(el)d[k]=el.value.trim();});}
function setReg(k,v){snapStudentInputs();state.reg.data[k]=v;render();}
function saveStudent(){
  const d=state.reg.data;
  d.name=val('sname');d.guardian=val('fname');d.school=val('school');d.dob=val('dob');
  if(!d.name||!d.guardian||!d.cls||!d.school){toast('Please fill name, guardian, class and school',true);return;}
  if(!d.medium)d.medium='Hindi';
  state.reg.step=2;loadLocationData();render();
}
async function loadLocationData(){
  try{
    if(state.geo===null) state.geo=await api('/api/geo');
    if(state.centers===null) state.centers=await api('/api/centers'+(state.exam?('?exam_id='+encodeURIComponent(state.exam.exam_id)):''));
    render();
  }catch(e){toast('Could not load location data: '+e.message,true);}
}
function panKey(dist,blk){return dist+'||'+blk;}
async function loadPanchayats(dist,blk){
  const k=panKey(dist,blk);
  if(state.panchayats[k]!==undefined)return;
  state.panchayats[k]=null; // mark loading
  try{state.panchayats[k]=await api('/api/geo/panchayats?district='+encodeURIComponent(dist)+'&block='+encodeURIComponent(blk));}
  catch(e){state.panchayats[k]=[];toast(e.message,true);}
  render();
}
function regLocation(){
  const d=state.reg.data;
  if(state.geo===null||state.centers===null)return `<p><span class="spin"></span> Loading districts & centres…</p>`;
  const districts=(state.geo.districts)||[];
  const distOpts=`<option value="">Select district</option>`+districts.map(x=>`<option ${d.district===x.district_name?'selected':''}>${esc(x.district_name)}</option>`).join('');
  const distObj=districts.find(x=>x.district_name===d.district);
  let blockOpts=`<option value="">Select block</option>`;
  if(distObj)blockOpts+=distObj.blocks.map(b=>`<option ${d.block===b.block_name?'selected':''}>${esc(b.block_name)}</option>`).join('');
  // Panchayat (gram panchayat) — the student's home GP, lazy-loaded per block. Drives panchayat-level rank.
  let panBlock='';
  if(d.district&&d.block){
    const k=panKey(d.district,d.block),list=state.panchayats[k];
    if(list===undefined){loadPanchayats(d.district,d.block);}
    if(list===undefined||list===null){
      panBlock=`<div class="field"><label>Panchayat</label><select class="input" disabled><option>Loading panchayats…</option></select></div>`;
    }else if(list.length){
      const pOpts=list.map(p=>`<option value="${esc(p.panchayat_code)}" ${d.panchayat_code===p.panchayat_code?'selected':''}>${esc(p.panchayat_name)}</option>`).join('');
      panBlock=`<div class="field"><label>Panchayat <span class="req">*</span></label>
        <select class="input" onchange="setPanchayat(this.value)"><option value="">Select your gram panchayat</option>${pOpts}</select>
        <div class="hint">Your home panchayat — used for your Panchayat-level rank.</div></div>`;
    }else{
      panBlock=`<div class="hint" style="margin-bottom:12px">No gram panchayats listed for this block; your block will be used for ranking.</div>`;
    }
  }
  // Centres physically in the chosen district+block gate the exam seat.
  let centreBlock='';
  if(d.district&&d.block){
    const inBlock=state.centers.filter(c=>c.district_name===d.district&&c.block_name===d.block);
    const open=inBlock.filter(c=>c.seats_left>0);
    if(open.length){
      const cOpts=open.map(c=>`<option value="${esc(c.center_id)}" ${d.center_id===c.center_id?'selected':''}>${esc(c.name)} (${c.seats_left} seats left)</option>`).join('');
      centreBlock=`<div class="field"><label>Exam centre <span class="req">*</span></label>
        <select class="input" onchange="setLoc('center_id',this.value)"><option value="">Select centre</option>${cOpts}</select></div>`;
    }else if(inBlock.length){
      centreBlock=`<div class="card pad" style="background:#f8e6e0;box-shadow:none;border:1px dashed var(--danger);color:var(--danger);margin-bottom:16px">The centre in this block is full. Please pick a nearby block or contact your coordinator.</div>`;
    }else{
      centreBlock=`<div class="card pad" style="background:#faf8f2;box-shadow:none;border-style:dashed;margin-bottom:16px"><b style="color:var(--indigo)">No exam centre in this block yet.</b><div class="hint" style="margin-top:4px">Centres are being added block by block. Try a nearby block, or check back soon.</div></div>`;
    }
  }
  const chosen=state.centers.find(c=>c.center_id===d.center_id&&c.district_name===d.district&&c.block_name===d.block);
  const panList=state.panchayats[panKey(d.district,d.block)];
  const panNeeded=Array.isArray(panList)&&panList.length>0;
  const canSubmit=chosen&&(!panNeeded||d.panchayat_code);
  return `<h3 style="font-size:20px;color:var(--indigo);margin-bottom:6px">Where is the student?</h3>
  <p class="muted" style="font-size:14px;margin:0 0 18px">Pick district → block → your panchayat, then an available exam centre. This sets how you're ranked.</p>
  <div class="field"><label>State <span class="req">*</span></label><select class="input" disabled><option>Bihar</option></select></div>
  <div class="field"><label>District <span class="req">*</span></label><select class="input" onchange="setLoc('district',this.value)">${distOpts}</select></div>
  <div class="field"><label>Block <span class="req">*</span></label><select class="input" onchange="setLoc('block',this.value)" ${!d.district?'disabled':''}>${blockOpts}</select></div>
  ${panBlock}
  ${centreBlock}
  <button class="btn primary block lg" onclick="finishReg()" ${(!canSubmit)?'disabled':''}>Submit registration →</button>`;
}
function setPanchayat(code){const d=state.reg.data;const list=state.panchayats[panKey(d.district,d.block)]||[];
  const p=list.find(x=>x.panchayat_code===code);d.panchayat_code=code;d.panchayat_name=p?p.panchayat_name:'';render();}
function setLoc(k,v){const d=state.reg.data;d[k]=v;
  if(k==='district'){d.block='';d.center_id='';d.panchayat_code='';d.panchayat_name='';}
  if(k==='block'){d.center_id='';d.panchayat_code='';d.panchayat_name='';}
  render();}
async function finishReg(){
  const d=state.reg.data;
  const c=state.centers.find(x=>x.center_id===d.center_id);
  if(!c){toast('Pick an exam centre first',true);return;}
  d._centerName=c.name;
  const distObj=(state.geo.districts||[]).find(x=>x.district_name===d.district);
  const blkObj=distObj&&distObj.blocks.find(b=>b.block_name===d.block);
  // Home district/block from the geo selection; panchayat from the chosen GP
  // (falls back to the centre's panchayat if the block has no GP list). Centre = venue.
  const payload={exam_id:state.exam.exam_id,name:d.name,guardian_name:d.guardian,dob:d.dob||null,gender:d.gender||null,
    school_name:d.school,medium:d.medium||'Hindi',cls:Number(d.cls),
    district_name:d.district,district_code:(distObj&&distObj.district_code)||c.district_code,
    block_name:d.block,block_code:(blkObj&&blkObj.block_code)||c.block_code,
    panchayat_name:d.panchayat_name||c.panchayat_name,panchayat_code:d.panchayat_code||c.panchayat_code,
    center_id:c.center_id};
  toast('Submitting…');
  try{const r=await api('/api/adult/students',{method:'POST',body:payload,auth:true});state.reg.result=r;state.reg.step=3;render();}
  catch(e){toast('Registration failed: '+e.message,true);}
}
function confirmation(){

  return shell(`
  <section class="band"><div class="wrap" style="max-width:600px">

      </div>
      <div class="admit kv" style="border:0;box-shadow:none;margin:20px 0 4px;text-align:left">

function studentLoginPage(){
  const st=state.student.data;
  if(st)return shell(studentDash());
  return shell(`
  <section class="band"><div class="wrap" style="max-width:520px">
    <div class="backlink" onclick="go('home')">← Home</div>
    <div class="card pad"><span class="eyebrow">Student login</span>
      <h2 style="font-size:26px;color:var(--indigo);margin:8px 0 6px">Enter your username</h2>
      <p class="muted" style="font-size:14px;margin:0 0 18px">The username printed on your admit card. No password — you can only view your own score, ranks, and admit card. Nothing private is shown.</p>
      <div class="field"><label>Username</label><input class="input" id="uname" placeholder="e.g. Mukesh_Singh_87" onkeydown="if(event.key==='Enter')studentSignin()"></div>
      ${state.student.error?`<p class="hint" style="color:var(--danger)">${esc(state.student.error)}</p>`:''}
      <button class="btn primary block lg" onclick="studentSignin()">View my dashboard →</button>
    </div></div></section>`);
}
async function studentSignin(){
  const u=val('uname');if(!u){toast('Type your username',true);return;}
  if(!state.exam){toast('No exam available',true);return;}
  state.student.error=null;toast('Looking up…');
  const q='?exam_id='+encodeURIComponent(state.exam.exam_id);
  try{
    const admit=await api('/api/student/'+encodeURIComponent(u)+'/admit-card'+q);
    state.student.admit=admit;
    try{state.student.data=await api('/api/student/'+encodeURIComponent(u)+'/result'+q);}
    catch(e){state.student.data={_noresult:true,username:u,name:admit.name,class:admit.class};}
    render();
  }catch(e){state.student.error=e.message;state.student.data=null;render();}
}
function studentDash(){
  const r=state.student.data;
  return `<section class="band"><div class="wrap" style="max-width:720px">
    <div class="backlink" onclick="state.student={data:null,admit:null,error:null};render()">← Log out</div>
    <div class="card pad" style="margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="width:46px;height:46px;border-radius:50%;background:var(--indigo);color:#fff;display:grid;place-items:center;font-family:Fraunces;font-weight:600">${esc((r.name||'S')[0])}</div>
      <div style="flex:1"><h3 style="font-size:19px;color:var(--indigo)">${esc((r.name||'').split(' ')[0])}'s dashboard</h3>
        <p class="muted" style="font-size:13px;margin:2px 0 0">Username ${esc(r.username)} · Class ${esc(r.class)}</p></div>
      <span class="tag open">Read-only</span></div>
    ${r._noresult?`<div class="card pad center"><span class="eyebrow">Result</span><h3 style="color:var(--indigo);margin:8px 0">Results not published yet</h3><p class="muted">Your registration is confirmed. Check back after the exam is evaluated.</p></div>`:resultInner(r)}
    <div class="card pad" style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <div><h4 style="font-size:16px">Admit card</h4><p class="muted" style="font-size:13px;margin:2px 0 0">PII-free — safe to show anyone.</p></div>
      <a class="btn indigo" onclick="showAdmit()">${icon('dl')} View / download</a></div>
  </div></section>`;
}
function resultInner(s){
  const total=s.total_marks||100,pct=Math.round((s.marks_obtained||0)/total*100);
  const rk=s.ranks||{};
  const slices=[["Panchayat",rk.panchayat,true],["Block",rk.block,false],["District",rk.district,false],["State",rk.state,false]];
  return `<div class="card pad">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
      <div><span class="eyebrow">${esc(state.exam?state.exam.name:'Result')}</span>
        <h2 style="font-size:24px;color:var(--indigo);margin:6px 0 2px">${esc(s.name)}</h2>
        <p class="muted" style="font-size:13px;margin:0">Class ${esc(s.class)} · ${esc(s.panchayat_name)}, ${esc(s.block_name)}, ${esc(s.district_name)}</p></div>
      <div class="tag open" style="font-size:12px">Result declared</div></div>
    <div class="divider"></div>
    <div class="score-wrap">
      <div class="altitude"><div class="lbl">Your score</div><div class="fill" style="height:${pct}%"></div></div>
      <div><div class="bignum">${esc(s.marks_obtained)}<small>/${esc(total)}</small></div>
        <p class="muted" style="margin:6px 0 0">${pct}% · ${pct>=80?'Excellent — top band.':pct>=60?'Strong result. Keep climbing.':'A solid start — next quarter counts too.'}</p>
        <div class="slices">${slices.map(([lv,rec,gold])=>{rec=rec||{};return `
          <div class="slice ${gold&&rec.rank<=3?'gold':''}"><div class="lv">${lv} rank · Class ${esc(s.class)}</div>
            <div class="rank">#${esc(rec.rank!=null?rec.rank:'—')} <small>/ ${esc(rec.of!=null?rec.of:'—')}</small></div>
            <div class="of">${topLabel(rec.rank)}</div></div>`;}).join('')}</div>
      </div></div></div>`;
}
function topLabel(r){if(r===1)return '🏆 Rank 1 — topper';if(r&&r<=3)return '🥈 Podium finish';if(r&&r<=10)return 'Top 10';return 'Keep going';}

/* ============================================================
   PUBLIC LEADERBOARD
   ============================================================ */
async function loadLeaderboard(){
  const lb=state.leaderboard;if(!state.exam){lb.rows=[];render();return;}
  let q='?exam_id='+encodeURIComponent(state.exam.exam_id)+'&cls='+lb.cls+'&scope='+lb.scope;
  if(lb.scope!=='state'&&lb.value)q+='&scope_value='+encodeURIComponent(lb.value);
  try{lb.rows=await api('/api/leaderboard'+q);}catch(e){lb.rows=[];toast(e.message,true);}render();
}
function leaderboard(){
  const lb=state.leaderboard;
  if(lb.rows===null){loadLeaderboard();return shell(`<section class="band"><div class="wrap"><div class="backlink" onclick="go('home')">← Home</div><p><span class="spin"></span> Loading leaderboard…</p></div></section>`);}
  const clsList=(state.exam&&state.exam.eligible_classes&&state.exam.eligible_classes.length)?state.exam.eligible_classes:[7,8,9,10];
  const rows=lb.rows||[];
  return shell(`
  <section class="band"><div class="wrap">
    <div class="backlink" onclick="go('home')">← Home</div>
    <div class="sec-head"><span class="eyebrow">Merit lists</span><h2>Leaderboard</h2>
      <p>Toppers by level and class — the same numbers students see on their result.</p></div>
    <div class="toolbar">
      <select onchange="state.leaderboard.cls=+this.value;state.leaderboard.rows=null;render()">${clsList.map(c=>`<option value="${c}" ${c===lb.cls?'selected':''}>Class ${c}</option>`).join('')}</select>
      <select onchange="state.leaderboard.scope=this.value;state.leaderboard.value=null;state.leaderboard.rows=null;render()">
        ${[['panchayat','Panchayat'],['block','Block'],['district','District'],['state','State']].map(([v,l])=>`<option value="${v}" ${v===lb.scope?'selected':''}>${l} level</option>`).join('')}</select>
      ${lb.scope!=='state'?`<input placeholder="${lb.scope} name (optional)" value="${esc(lb.value||'')}" onchange="state.leaderboard.value=this.value;state.leaderboard.rows=null;render()">`:''}
      <span class="muted" style="font-size:13px">${rows.length} shown</span>
    </div>
    <div class="card" style="overflow:hidden"><table>
      <thead><tr><th style="width:70px">Rank</th><th>Student</th><th>Panchayat</th><th>Block</th><th class="num">Score</th></tr></thead>
      <tbody>${rows.length?rows.map((s,i)=>`<tr>
        <td><span class="rankbadge ${i<3?'g'+(i+1):''}">${i+1}</span></td>
        <td style="font-weight:600">${esc(s.name)}</td><td class="muted">${esc(s.panchayat_name)}</td>
        <td class="muted">${esc(s.block_name)}</td><td class="num" style="font-weight:700">${esc(s.marks_obtained)}</td>
      </tr>`).join(''):'<tr><td colspan="5" class="muted center" style="padding:30px">No published results for this slice yet.</td></tr>'}</tbody>
    </table></div>
  </div></section>`);
}

async function loadRegs(){try{state.admin.regs=await api('/api/admin/registrations?exam_id='+encodeURIComponent(state.exam.exam_id),{auth:true});}catch(e){state.admin.regs=[];toast(e.message,true);}render();}
function adminOverview(){
  if(!state.exam)return `<p class="muted">No exam configured.</p>`;
  if(state.admin.regs===null){loadRegs();return `<p><span class="spin"></span> Loading…</p>`;}
  const regs=state.admin.regs,total=regs.length;
  const clsList=(state.exam.eligible_classes&&state.exam.eligible_classes.length)?state.exam.eligible_classes:[7,8,9,10];
  const byClass=clsList.map(c=>[c,regs.filter(r=>r.class==c).length]);
  const dists=[...new Set(regs.map(r=>r.district_name))];
  const uploaded=regs.filter(r=>r.marks_obtained!=null).length;
  const maxC=Math.max(1,...byClass.map(x=>x[1]));
  return `<h2 style="font-size:26px;color:var(--indigo);margin-bottom:4px">Overview</h2>
  <p class="muted" style="margin:0 0 22px">${esc(state.exam.name)} · ${esc(fmtDate(state.exam.exam_date))} · <span class="tag ${state.exam.status==='open'?'open':'closed'}">${esc(state.exam.status)}</span></p>
  <div class="stat-grid">
    <div class="stat"><div class="l">Registrations</div><div class="v">${total}</div></div>
    <div class="stat"><div class="l">Districts</div><div class="v">${dists.length}</div></div>
    <div class="stat"><div class="l">Marks uploaded</div><div class="v">${uploaded}</div><div class="d">${total?Math.round(uploaded/total*100):0}%</div></div>

  </div>
  <div class="grid2">
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:14px">Registrations by class</h4>
      ${byClass.map(([c,n])=>{const w=Math.round(n/maxC*100);return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:66px;font-size:13px;font-weight:600">Class ${c}</div>
        <div style="flex:1;height:12px;background:#f1eadd;border-radius:6px;overflow:hidden"><div style="width:${w}%;height:100%;background:var(--marigold)"></div></div>
        <div style="width:34px;text-align:right;font-weight:700">${n}</div></div>`;}).join('')}</div>
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:14px">By district</h4>
      ${dists.length?dists.map(d=>{const n=regs.filter(r=>r.district_name===d).length;const w=Math.round(n/Math.max(1,total)*100);return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:96px;font-size:13px;font-weight:600">${esc(d)}</div>
        <div style="flex:1;height:12px;background:#f1eadd;border-radius:6px;overflow:hidden"><div style="width:${w}%;height:100%;background:var(--indigo)"></div></div>
        <div style="width:34px;text-align:right;font-weight:700">${n}</div></div>`;}).join(''):'<p class="muted">No registrations yet.</p>'}</div>

    <select onchange="state.admin.filters.district=this.value;render()"><option value="all">All districts</option>${dists.map(d=>`<option ${f.district===d?'selected':''}>${esc(d)}</option>`).join('')}</select>
    <button class="btn ghost" style="padding:9px 16px;font-size:14px" onclick="exportRegs()">${icon('dl')} Export CSV</button>
  </div>
  <div class="card" style="overflow:auto"><table>
    <thead><tr><th>Student ID</th><th>Name</th><th>Class</th><th>Panchayat</th><th>Block</th><th>District</th><th>Status</th><th class="num">Marks</th></tr></thead>
    <tbody>${rows.length?rows.map(r=>`<tr>
      <td style="font-family:ui-monospace,monospace;font-size:13px">${esc(r.student_id)}</td>
      <td style="font-weight:600">${esc(r.student_name)}</td><td>${esc(r.class)}</td>
      <td class="muted">${esc(r.panchayat_name)}</td><td class="muted">${esc(r.block_name)}</td><td class="muted">${esc(r.district_name)}</td>
      <td><span class="tag ${r.status==='published'?'open':'draft'}">${esc(r.status)}</span></td>
      <td class="num" style="font-weight:700">${r.marks_obtained!=null?esc(r.marks_obtained):'—'}</td></tr>`).join(''):'<tr><td colspan="8" class="muted center" style="padding:30px">No registrations.</td></tr>'}</tbody>
  </table></div>
  <p class="muted" style="font-size:13px;margin-top:10px">Showing ${rows.length} of ${state.admin.regs.length}.</p>`;
}
async function exportRegs(){
  try{const res=await fetch(API+'/api/admin/registrations?exam_id='+encodeURIComponent(state.exam.exam_id)+'&fmt=csv',{headers:{'Authorization':'Bearer '+state.idToken}});
    if(!res.ok)throw new Error('Export failed ('+res.status+')');
    const blob=await res.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='registrations.csv';a.click();URL.revokeObjectURL(a.href);toast('CSV downloaded');}
  catch(e){toast(e.message,true);}
}
function adminMarks(){
  const out=state.admin.marksOut;
  return `<h2 style="font-size:26px;color:var(--indigo);margin-bottom:4px">Upload marks</h2>
  <p class="muted" style="margin:0 0 20px">The exam is on paper. After evaluation, paste marks here — the platform computes every rank slice on publish.</p>
  <div class="grid2" style="align-items:start">
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:6px">Paste marks</h4>
      <p class="muted" style="font-size:13px;margin:0 0 12px">One per line: <span class="kbd">student_id, marks_obtained</span></p>
      <textarea class="input" id="marksBox" placeholder="UD-DAR-0001, 88&#10;UD-DAR-0002, 72">${esc((out&&out._raw)||'')}</textarea>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="btn primary" onclick="submitMarks()">${icon('check')} Validate & save</button></div>
      <p class="hint" style="margin-top:12px">Unmatched IDs are flagged, not dropped.</p>
      ${out?`<div class="divider"></div><div class="admit kv" style="border:0;box-shadow:none">
        <div class="k">Matched & saved</div><div class="v" style="color:var(--sprout)">${out.matched}</div>
        <div class="k">Unmatched</div><div class="v" style="color:${out.unmatched.length?'var(--danger)':'var(--muted)'}">${out.unmatched.length}${out.unmatched.length?' ('+out.unmatched.map(esc).join(', ')+')':''}</div></div>`:''}
    </div>
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:10px">Publish results</h4>
      <p class="muted" style="font-size:13px;margin:0 0 14px">Precomputes all four rank slices per student and makes results + leaderboard live. Run after all marks are uploaded.</p>
      <button class="btn indigo block" onclick="publishResults()">Publish results to students</button>
      <p class="hint center" style="margin-top:10px">Status: ${state.exam&&state.exam.results_published?'<b style="color:var(--sprout)">Published</b>':'Not published'}</p>
    </div>
  </div>`;
}
async function submitMarks(){
  const raw=val('marksBox');if(!raw){toast('Paste some rows first',true);return;}
  const rows=[];const bad=[];
  raw.split(/\n/).forEach(line=>{line=line.trim();if(!line)return;const parts=line.split(/[,\t]/);if(parts.length<2){bad.push(line);return;}
    const id=parts[0].trim(),m=parseFloat(parts[1].trim());if(!id||isNaN(m)){bad.push(line);return;}rows.push({student_id:id,marks_obtained:m});});
  if(!rows.length){toast('No valid rows parsed',true);return;}
  toast('Saving '+rows.length+' rows…');
  try{const r=await api('/api/admin/marks',{method:'POST',body:{exam_id:state.exam.exam_id,rows},auth:true});
    r._raw=raw;state.admin.marksOut=r;state.admin.regs=null;toast('Saved: '+r.matched+' matched, '+r.unmatched.length+' unmatched');render();}
  catch(e){toast(e.message,true);}
}
async function publishResults(){
  if(!confirm('Publish results? This computes ranks and makes them visible to all students.'))return;
  toast('Publishing…');
  try{const r=await api('/api/admin/publish?exam_id='+encodeURIComponent(state.exam.exam_id),{method:'POST',auth:true});
    if(state.exam)state.exam.results_published=true;state.admin.regs=null;state.admin.results=null;
    toast('Published '+r.published_registrations+' results ✓');render();}
  catch(e){toast(e.message,true);}
}
async function loadAdminResults(){
  const f=state.admin.filters;let q='?exam_id='+encodeURIComponent(state.exam.exam_id);
  if(f.cls!=='all')q+='&cls='+f.cls;if(f.district!=='all')q+='&district='+encodeURIComponent(f.district);
  try{state.admin.results=await api('/api/admin/results'+q,{auth:true});}catch(e){state.admin.results=null;toast(e.message,true);}render();
}
function adminResults(){
  const f=state.admin.filters;
  if(state.admin.results===null||state.admin.results===undefined){loadAdminResults();return `<p><span class="spin"></span> Loading…</p>`;}
  const R=state.admin.results;
  const clsList=(state.exam.eligible_classes&&state.exam.eligible_classes.length)?state.exam.eligible_classes:[7,8,9,10];
  const dists=[...new Set((state.admin.regs||[]).map(r=>r.district_name))];
  const dist=R.distribution||{};const order=["<40","40-59","60-74","75-89","90+"];const maxN=Math.max(1,...order.map(k=>dist[k]||0));
  return `<h2 style="font-size:26px;color:var(--indigo);margin-bottom:4px">Results &amp; slices</h2>
  <p class="muted" style="margin:0 0 18px">Same engine that powers each student's rank card.</p>
  <div class="toolbar">
    <select onchange="state.admin.filters.cls=this.value;state.admin.results=null;render()"><option value="all">All classes</option>${clsList.map(c=>`<option value="${c}" ${f.cls==c?'selected':''}>Class ${c}</option>`).join('')}</select>
    <select onchange="state.admin.filters.district=this.value;state.admin.results=null;render()"><option value="all">All districts</option>${dists.map(d=>`<option ${f.district===d?'selected':''}>${esc(d)}</option>`).join('')}</select>
  </div>
  ${R.count?`<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat"><div class="l">Students in slice</div><div class="v">${R.count}</div></div>
    <div class="stat"><div class="l">Average</div><div class="v">${esc(R.average)}</div></div>
    <div class="stat"><div class="l">Top score</div><div class="v">${R.top&&R.top[0]?esc(R.top[0].marks_obtained):'—'}</div><div class="d">${R.top&&R.top[0]?esc(R.top[0].name):''}</div></div></div>
  <div class="grid2" style="align-items:start">
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:16px">Score distribution</h4>
      <div style="display:flex;align-items:flex-end;gap:12px;height:170px">
        ${order.map(k=>{const n=dist[k]||0;return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end">
          <div style="font-weight:700;font-size:13px">${n}</div>
          <div style="width:100%;background:linear-gradient(180deg,var(--marigold),var(--marigold-deep));border-radius:8px 8px 0 0;height:${Math.max(6,Math.round(n/maxN*130))}px"></div>
          <div style="font-size:12px;color:var(--muted)">${k}</div></div>`;}).join('')}</div></div>
    <div class="card pad"><h4 style="font-size:16px;margin-bottom:12px">Top 10 in this slice</h4>
      <table><tbody>${(R.top||[]).map((s,i)=>`<tr>
        <td style="width:40px"><span class="rankbadge ${i<3?'g'+(i+1):''}">${i+1}</span></td>
        <td style="font-weight:600">${esc(s.name)}</td><td class="muted" style="font-size:13px">C${esc(s.class)} · ${esc(s.panchayat_name)}</td>
        <td class="num" style="font-weight:700">${esc(s.marks_obtained)}</td></tr>`).join('')}</tbody></table></div>
  </div>`:'<div class="card pad center"><p class="muted">No marks uploaded for this slice yet. Upload marks, then publish.</p></div>'}`;
}

/* ---------- admin: exam centres ---------- */
async function loadAdminCenters(){
  try{state.admin.centers=await api('/api/admin/centers?exam_id='+encodeURIComponent(state.exam.exam_id),{auth:true});}
  catch(e){state.admin.centers=[];toast(e.message,true);}render();
}
// Snapshot centre-form text inputs before a re-render (same pattern as registration).
function cfSnap(){const f=state.admin.centerForm;
  [['cf_name','name'],['cf_addr','address'],['cf_cap','capacity'],['cf_coord','coordinator_name'],['cf_mobile','coordinator_mobile']]
    .forEach(([id,k])=>{const el=document.getElementById(id);if(el)f[k]=el.value.trim();});}
function cfSet(k,v){cfSnap();const f=state.admin.centerForm;f[k]=v;
  if(k==='district'){f.block='';f.panchayat_code='';f.panchayat_name='';}
  if(k==='block'){f.panchayat_code='';f.panchayat_name='';}
  render();}
function cfSetPan(code){cfSnap();const f=state.admin.centerForm;const list=state.panchayats[panKey(f.district,f.block)]||[];
  const p=list.find(x=>x.panchayat_code===code);f.panchayat_code=code;f.panchayat_name=p?p.panchayat_name:'';render();}
function adminCenters(){
  if(!state.exam)return `<p class="muted">No exam configured.</p>`;
  if(state.geo===null){loadLocationData();return `<p><span class="spin"></span> Loading…</p>`;}
  if(state.admin.centers===null){loadAdminCenters();return `<p><span class="spin"></span> Loading centres…</p>`;}
  const f=state.admin.centerForm,districts=(state.geo.districts)||[];
  const distObj=districts.find(x=>x.district_name===f.district);
  const distOpts=`<option value="">Select district</option>`+districts.map(x=>`<option ${f.district===x.district_name?'selected':''}>${esc(x.district_name)}</option>`).join('');
  let blockOpts=`<option value="">Select block</option>`;
  if(distObj)blockOpts+=distObj.blocks.map(b=>`<option ${f.block===b.block_name?'selected':''}>${esc(b.block_name)}</option>`).join('');
  let panField='';
  if(f.district&&f.block){
    const k=panKey(f.district,f.block),list=state.panchayats[k];
    if(list===undefined){loadPanchayats(f.district,f.block);}
    if(list===undefined||list===null){panField=`<div class="field"><label>Panchayat (optional)</label><select class="input" disabled><option>Loading…</option></select></div>`;}
    else if(list.length){panField=`<div class="field"><label>Panchayat (optional)</label><select class="input" onchange="cfSetPan(this.value)"><option value="">— none / block HQ —</option>${list.map(p=>`<option value="${esc(p.panchayat_code)}" ${f.panchayat_code===p.panchayat_code?'selected':''}>${esc(p.panchayat_name)}</option>`).join('')}</select></div>`;}
  }
  const cs=state.admin.centers;
  const rows=cs.length?cs.map(c=>`<tr>
    <td style="font-weight:600">${esc(c.name)}${c.address?`<div class="muted" style="font-size:12px;font-weight:400">${esc(c.address)}</div>`:''}</td>
    <td class="muted">${esc(c.panchayat_name?c.panchayat_name+', ':'')}${esc(c.block_name)}, ${esc(c.district_name)}</td>
    <td class="num">${esc(c.used_capacity||0)} / ${esc(c.capacity)}</td>
    <td class="muted" style="font-size:13px">${esc(c.coordinator_name||'—')}${c.coordinator_mobile?'<br>'+esc(c.coordinator_mobile):''}</td>
    <td><span class="tag ${c.active?'open':'closed'}">${c.active?'active':'inactive'}</span></td>
    <td><a onclick="toggleCenter('${esc(c.center_id)}',${c.active?'false':'true'})" style="color:var(--indigo);cursor:pointer;font-weight:600;font-size:13px">${c.active?'Deactivate':'Activate'}</a></td>
  </tr>`).join(''):'<tr><td colspan="6" class="muted center" style="padding:24px">No centres yet. Add your first one.</td></tr>';
  return `<h2 style="font-size:26px;color:var(--indigo);margin-bottom:4px">Exam centres</h2>
  <p class="muted" style="margin:0 0 20px">Add the offline venues. Registration opens for a district+block as soon as it has an active centre.</p>
  <div class="grid2" style="align-items:start">
    <div class="card pad">
      <h4 style="font-size:16px;margin-bottom:14px">Add a centre</h4>
      <div class="field"><label>Centre name <span class="req">*</span></label><input class="input" id="cf_name" value="${esc(f.name||'')}" placeholder="e.g. Rasalpur Panchayat Bhavan"></div>
      <div class="field"><label>Address</label><input class="input" id="cf_addr" value="${esc(f.address||'')}" placeholder="Landmark / village"></div>
      <div class="field"><label>District <span class="req">*</span></label><select class="input" onchange="cfSet('district',this.value)">${distOpts}</select></div>
      <div class="field"><label>Block <span class="req">*</span></label><select class="input" onchange="cfSet('block',this.value)" ${!f.district?'disabled':''}>${blockOpts}</select></div>
      ${panField}
      <div class="row2">
        <div class="field"><label>Capacity <span class="req">*</span></label><input class="input" id="cf_cap" type="number" min="1" value="${esc(f.capacity||'')}" placeholder="120"></div>
        <div class="field"><label>Coordinator mobile</label><input class="input" id="cf_mobile" value="${esc(f.coordinator_mobile||'')}"></div>
      </div>
      <div class="field"><label>Coordinator name</label><input class="input" id="cf_coord" value="${esc(f.coordinator_name||'')}"></div>
      <button class="btn primary block" onclick="createCenter()">${icon('check')} Add centre</button>
    </div>
    <div class="card" style="overflow:auto">
      <table><thead><tr><th>Centre</th><th>Location</th><th class="num">Used/Cap</th><th>Coordinator</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
  </div>`;
}
async function createCenter(){
  cfSnap();const f=state.admin.centerForm;
  const distObj=(state.geo.districts||[]).find(x=>x.district_name===f.district);
  const blkObj=distObj&&distObj.blocks.find(b=>b.block_name===f.block);
  const cap=parseInt(f.capacity,10);
  if(!f.name||!f.district||!f.block){toast('Name, district and block are required',true);return;}
  if(!cap||cap<1){toast('Enter a valid capacity',true);return;}
  const payload={exam_id:state.exam.exam_id,name:f.name,address:f.address||null,
    district_name:f.district,district_code:distObj?distObj.district_code:'',
    block_name:f.block,block_code:blkObj?blkObj.block_code:'',
    panchayat_name:f.panchayat_name||null,panchayat_code:f.panchayat_code||null,
    capacity:cap,coordinator_name:f.coordinator_name||null,coordinator_mobile:f.coordinator_mobile||null,active:true};
  toast('Adding centre…');
  try{await api('/api/admin/centers',{method:'POST',body:payload,auth:true});
    state.admin.centerForm={};state.admin.centers=null;state.centers=null; // refresh admin list + public list
    toast('Centre added ✓');render();}
  catch(e){toast(e.message,true);}
}
async function toggleCenter(id,active){
  try{await api('/api/admin/centers/'+encodeURIComponent(id),{method:'PATCH',body:{active:active},auth:true});
    state.admin.centers=null;state.centers=null;toast('Updated ✓');render();}
  catch(e){toast(e.message,true);}
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  banner();
  const root=document.getElementById('root');
  if(!state.ready){root.innerHTML=`<div style="display:grid;place-items:center;min-height:60vh"><div><span class="spin"></span> Loading Udaan…</div></div>`;return;}
  let html='';
  switch(state.route){
    case 'home':html=home();break;
    case 'papers':html=papers();break;
    case 'register':html=register();break;
    case 'studentLogin':html=studentLoginPage();break;
    case 'adultdash':html=adultDash();break;
    case 'admit':html=admit();break;
    case 'result':html=result();break;
    case 'leaderboard':html=leaderboard();break;
    case 'admin':html=admin();break;
    default:html=home();
  }
  root.innerHTML=html;
  renderGoogleButtons();
}
boot();
</script>
</body>
</html>
