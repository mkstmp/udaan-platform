# Cloud Build → Artifact Registry → Cloud Run (backend + same-origin SPA).
# Trigger on push to main, or run manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_TAG=v1,_GOOGLE_CLIENT_ID=xxxx,_FRONTEND_ORIGIN=*
#
# _TAG defaults to "latest" for manual runs; a push trigger can pass _TAG=$SHORT_SHA.
substitutions:
  _REGION: asia-south1
  _REPO: udaan
  _SERVICE: udaan-api
  _TAG: latest
  _GOOGLE_CLIENT_ID: ""
  _FRONTEND_ORIGIN: "*"

steps:
  # Build the container (context = repo root so the frontend/ dir is included).
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - -f
      - backend/Dockerfile
      - .

  # Push to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}

  # Deploy to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=udaan-api@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},FRONTEND_ORIGIN=${_FRONTEND_ORIGIN}
      - --min-instances=0
      - --max-instances=10

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
